<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>TicTacToe</title>
  </head>
  <body class="flex flex-col h-screen text-white font-semibold">
    <header class="bg-blue-300 p-3 m-5 rounded-md">
      <h1 class="text-2xl md:text-4xl lg:text-5xl text-center font-bold">
        Tic Tac Toe
      </h1>
    </header>
    <main>
      <section class="flex justify-evenly">
        <div
          class="w-20 h-10 bg-blue-300 rounded-md mt-2 grid place-content-center"
        >
          <p>Player: 0</p>
        </div>
        <div
          class="w-20 h-10 bg-blue-300 rounded-md mt-2 grid place-content-center"
        >
          <p>Bot: 0</p>
        </div>
      </section>

      <section
        class="grid grid-cols-3 gap-2 bg-blue-300 p-6 rounded-md mx-auto max-w-md mt-8"
      >
        <!-- Cada celda ahora es un cuadrado perfecto gracias a aspect-square y w-full -->
        <div
          class="bg-white rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 cursor-pointer transition"
        ></div>
        <div
          class="bg-white rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 cursor-pointer transition"
        ></div>
        <div
          class="bg-white rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 cursor-pointer transition"
        ></div>
        <div
          class="bg-white rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 cursor-pointer transition"
        ></div>
        <div
          class="bg-white rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 cursor-pointer transition"
        ></div>
        <div
          class="bg-white rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 cursor-pointer transition"
        ></div>
        <div
          class="bg-white rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 cursor-pointer transition"
        ></div>
        <div
          class="bg-white rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 cursor-pointer transition"
        ></div>
        <div
          class="bg-white rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 cursor-pointer transition"
        ></div>
      </section>
    </main>
  </body>
</html>
