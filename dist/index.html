<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>TicTacToe</title>
  </head>
  <body
    class="bg-gray-50 flex flex-col h-screen text-white font-semibold md:text-md xl:text-xl"
  >
    <header class="bg-blue-400 dark:bg-blue-800 p-3 m-5 rounded-md shadow-xl">
      <h1 class="text-2xl md:text-4xl lg:text-5xl text-center font-bold">
        Tic Tac Toe
      </h1>
    </header>
    <main>
      <section class="flex justify-evenly">
        <div
          class="p-3 bg-blue-400 dark:bg-blue-800 rounded-md mt-2 grid place-content-center shadow-xl"
        >
          <p>Player: 0</p>
        </div>
        <div
          class="p-3 bg-blue-400 dark:bg-blue-800 rounded-md mt-2 grid place-content-center shadow-xl"
        >
          <p>Bot: 0</p>
        </div>
      </section>

      <section
        class="grid grid-cols-3 gap-2 bg-blue-400 dark:bg-blue-800 p-6 rounded-md mx-auto max-w-md mt-8 shadow-xl"
      >
        <div
          class="square bg-white dark:bg-gray-100 rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-200 cursor-pointer transition"
          id="square-1"
        ></div>
        <div
          class="square bg-white dark:bg-gray-100 rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-200 cursor-pointer transition"
          id="square-2"
        ></div>
        <div
          class="square bg-white dark:bg-gray-100 rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-200 cursor-pointer transition"
          id="square-3"
        ></div>
        <div
          class="square bg-white dark:bg-gray-100 rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-200 cursor-pointer transition"
          id="square-4"
        ></div>
        <div
          class="square bg-white dark:bg-gray-100 rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-200 cursor-pointer transition"
          id="square-5"
        ></div>
        <div
          class="square bg-white dark:bg-gray-100 rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-200 cursor-pointer transition"
          id="square-6"
        ></div>
        <div
          class="square bg-white dark:bg-gray-100 rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-200 cursor-pointer transition"
          id="square-7"
        ></div>
        <div
          class="square bg-white dark:bg-gray-100 rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-200 cursor-pointer transition"
          id="square-8"
        ></div>
        <div
          class="square bg-white dark:bg-gray-100 rounded-md aspect-square w-full flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-200 cursor-pointer transition"
          id="square-9"
        ></div>
      </section>
      <section
        class="grid grid-cols-2 max-w-md mx-auto mt-10 gap-10 place-content-center"
      >
        <button
          class="shadow-xl mx-auto p-1 w-4/5 text-center bg-blue-400 dark:bg-blue-800 rounded-md py-2"
        >
          Reset
        </button>
        <button
          class="shadow-xl mx-auto p-1 w-4/5 text-center bg-blue-400 dark:bg-blue-800 rounded-md py-2"
        >
          Settings
        </button>
        <button
          class="shadow-xl mx-auto p-1 w-4/5 text-center bg-blue-400 dark:bg-blue-800 rounded-md col-span-2 py-2"
        >
          About Me
        </button>
      </section>
    </main>
    <script src="script/main.js"></script>
    <style>
      .circle {
        width: 80%;
        height: 80%;
        border-radius: 50%;
        background-color: oklch(70.7% 0.165 254.624);
        position: relative;
      }
      .circle::before {
        width: 80%;
        height: 80%;
        border-radius: 50%;
        background-color: #fff;
        position: absolute;
        content: "";
        translate: 10px 10px;
      }

      .x {
        width: 80%;
        height: 80%;
        background-color: oklch(70.7% 0.165 254.624);
        clip-path: polygon(
          20% 0%,
          0% 20%,
          30% 50%,
          0% 80%,
          20% 100%,
          50% 70%,
          80% 100%,
          100% 80%,
          70% 50%,
          100% 20%,
          80% 0%,
          50% 30%
        );
      }
    </style>
  </body>
</html>
